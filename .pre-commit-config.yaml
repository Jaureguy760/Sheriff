# Pre-commit hooks for Sheriff
# Install with: pip install pre-commit && pre-commit install

repos:
  # Basic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=5000']  # Allow up to 5MB (for test BAM files)
      - id: check-merge-conflict
      - id: detect-private-key

  # Python formatting with Black
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.11
        args: ['--line-length=100']

  # Python import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile', 'black', '--line-length', '100']

  # Rust formatting
  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        entry: cargo fmt --manifest-path sheriff-rs/Cargo.toml --
        language: system
        files: \.rs$
        pass_filenames: true

  # Validate test data integrity on commit
  - repo: local
    hooks:
      - id: validate-test-data
        name: Validate test data checksums
        entry: python test_data/ci_validation.py
        language: system
        pass_filenames: false
        stages: [push]  # Only run on push, not every commit
